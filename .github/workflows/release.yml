name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.21.0 && git push origin v0.21.0
# (Scripts/release.sh does this for you.)
#
# This builds the signed-or-unsigned .pkg installer (app + HAL driver), computes
# its SHA-256, and attaches BOTH to the GitHub Release. The in-app updater
# (Sources/HydraApp/Updater.swift) polls the latest release, downloads the .pkg,
# verifies it against the .pkg.sha256 sidecar, and installs it via an admin
# prompt. No Sparkle / appcast.
#
# Optional signing secrets (for notarizable public distribution; not required for
# the checksum-verified in-app update):
#   APP_SIGN_ID        "Developer ID Application: NAME (TEAMID)"
#   INSTALLER_SIGN_ID  "Developer ID Installer: NAME (TEAMID)"

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish installer
    # Only the canonical repo cuts releases — a fork pushing a tag must never
    # publish an installer that the in-app updater would fetch.
    if: github.repository == 'sbacaro/Hydra-Soundcard'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Generate Xcode project
        run: ruby Scripts/generate_xcodeproj.rb

      - name: Build installer (.pkg)
        env:
          APP_SIGN_ID: ${{ secrets.APP_SIGN_ID }}
          INSTALLER_SIGN_ID: ${{ secrets.INSTALLER_SIGN_ID }}
        run: |
          set -o pipefail
          bash Packaging/build_pkg.sh

      - name: Resolve version + checksum
        id: vars
        run: |
          PKG="$(ls dist/Hydra-*.pkg | head -1)"
          [ -f "$PKG" ] || { echo "::error::no .pkg produced in dist/"; exit 1; }
          VERSION="$(basename "$PKG" | sed -E 's/^Hydra-(.*)\.pkg$/\1/')"
          ( cd dist && shasum -a 256 "$(basename "$PKG")" > "$(basename "$PKG").sha256" )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "sha=$PKG.sha256" >> "$GITHUB_OUTPUT"
          echo "Checksum: $(cat "$PKG.sha256")"

      # Use this version's CHANGELOG section as the release body (the auto-
      # generated commit list is appended below it via generate_release_notes).
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[${{ steps.vars.outputs.version }}/{f=1;next} /^## \[/{f=0} f' \
            CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Hydra ${{ steps.vars.outputs.version }} beta" > release_notes.md
          fi
          echo "----- release body -----"; cat release_notes.md

      - name: Publish GitHub Release (pkg + sha256)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hydra ${{ steps.vars.outputs.version }}
          body_path: release_notes.md
          generate_release_notes: true
          # Publish a real, non-draft, non-prerelease "latest" release. The
          # in-app updater queries /releases/latest, which EXCLUDES drafts and
          # prereleases — so these must stay false for updates to be seen.
          draft: false
          prerelease: false
          make_latest: true
          files: |
            ${{ steps.vars.outputs.pkg }}
            ${{ steps.vars.outputs.sha }}
