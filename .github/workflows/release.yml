name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.20.0 && git push origin v0.20.0
#
# This builds a universal (ad-hoc signed) Hydra.app, zips it, signs the zip with
# the Sparkle EdDSA key, generates the appcast, and attaches BOTH the zip and
# appcast.xml to the GitHub Release. The app's SUFeedURL points at
# releases/latest/download/appcast.xml, so shipping a new tagged release is all it
# takes for existing installs to see the update.
#
# One-time setup (see Packaging/RELEASING.md):
#   • Generate EdDSA keys with ThirdParty/Sparkle/bin/generate_keys.
#   • Paste the PUBLIC key into Sources/HydraApp/Info.plist (SUPublicEDKey).
#   • Export the PRIVATE key and store it as the repo secret SPARKLE_ED_PRIVATE_KEY.

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign & publish
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Generate Xcode project (also fetches Sparkle)
        run: ruby Scripts/generate_xcodeproj.rb

      - name: Build Hydra.app (Release, universal, ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Hydra.xcodeproj -scheme HydraApp -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-"

      - name: Resolve version + tag
        id: vars
        run: |
          APP="build/Build/Products/Release/Hydra.app"
          [ -d "$APP" ] || { echo "::error::built app missing: $APP"; exit 1; }
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Zip the app (ditto preserves the bundle)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.vars.outputs.app }}" "Hydra-${{ steps.vars.outputs.version }}.zip"

      - name: Sign + generate appcast (Sparkle EdDSA)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing secret SPARKLE_ED_PRIVATE_KEY — see Packaging/RELEASING.md"
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          mkdir -p sparkle-feed
          cp "Hydra-${{ steps.vars.outputs.version }}.zip" sparkle-feed/
          ./ThirdParty/Sparkle/bin/generate_appcast \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}/" \
            sparkle-feed
          rm -f "$KEY_FILE"
          test -f sparkle-feed/appcast.xml || { echo "::error::appcast.xml not generated"; exit 1; }

      - name: Publish GitHub Release (zip + appcast)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Hydra ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: |
            Hydra-${{ steps.vars.outputs.version }}.zip
            sparkle-feed/appcast.xml
